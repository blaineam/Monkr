<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />

		<!-- Primary Meta (always in raw HTML for crawlers) -->
		<title>Monkr - Device Mockup Generator</title>
		<meta name="description" content="Create beautiful device mockups in seconds. Drop in screenshots, pick a device frame, customize backgrounds, text, and animations — all in your browser. Free and open-source." />
		<meta name="author" content="Blaine Miller" />
		<meta name="theme-color" content="#09090b" />
		<meta name="keywords" content="mockup generator, device mockup, iPhone mockup, app store screenshots, browser mockup tool, free mockup, open source, screenshot tool, app preview, device frame" />
		<meta name="robots" content="index, follow" />

		<!-- Open Graph -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://monkr.wemiller.com" />
		<meta property="og:title" content="Monkr - Beautiful Device Mockups" />
		<meta property="og:description" content="Create stunning device mockups in seconds. Free, open-source, and runs entirely in your browser." />
		<meta property="og:image" content="https://monkr.wemiller.com/og-image.jpg" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:image:type" content="image/jpeg" />
		<meta property="og:image:alt" content="Monkr mockup generator showing iPhone device frames with app screenshots" />
		<meta property="og:site_name" content="Monkr" />
		<meta property="og:locale" content="en_US" />
		<meta property="og:logo" content="https://monkr.wemiller.com/favicon.png" />

		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Monkr - Beautiful Device Mockups" />
		<meta name="twitter:description" content="Create stunning device mockups in seconds. Free, open-source, and runs entirely in your browser." />
		<meta name="twitter:image" content="https://monkr.wemiller.com/og-image.jpg" />
		<meta name="twitter:image:alt" content="Monkr mockup generator showing iPhone device frames with app screenshots" />

		<!-- Structured Data -->
		<script type="application/ld+json">
		{
			"@context": "https://schema.org",
			"@type": "WebApplication",
			"name": "Monkr",
			"url": "https://monkr.wemiller.com",
			"description": "Create beautiful device mockups in seconds. Free, open-source, and runs entirely in your browser.",
			"applicationCategory": "DesignApplication",
			"operatingSystem": "Any",
			"offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
			"author": { "@type": "Person", "name": "Blaine Miller", "url": "https://wemiller.com" },
			"image": "https://monkr.wemiller.com/og-image.jpg",
			"browserRequirements": "Requires a modern browser with JavaScript enabled",
			"featureList": "Device mockups, App Store screenshots, Video animation export, Custom backgrounds, Text overlays, Multiple device layouts"
		}
		</script>

		<!-- Favicon & Icons -->
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/site.webmanifest" />

		<!-- Canonical -->
		<link rel="canonical" href="https://monkr.wemiller.com" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
